<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trabajos - Rojo Cabani</title>

    <link rel="stylesheet" href="css/styles.css?v=20260518i">
</head>

<body>

<div id="header-container"></div>

<main class="pagina">

    <section class="seccion">

        <h1>Nuestros Trabajos</h1>

        <p>
            Estos son algunos de nuestros trabajos realizados en sublimación y estampados personalizados
            para clientes y empresas.
        </p>

        <div class="grid trabajos-grid">

            <!-- TAZAS -->
            <div class="card">
                <img src="images/trabajos/trabajosCoorpTazas.png" alt="Tazas">
                <h3>Tazas Personalizadas</h3>
            </div>

            <!-- POLos -->
            <div class="card">
                <img src="images/trabajos/trabajosCoorpPolos.png" alt="Polos">
                <h3>Polos Corporativos</h3>
            </div>

            <!-- EVENTOS -->
            <div class="card">
                <img src="images/trabajos/trabajosCoorEventos.png" alt="Eventos">
                <h3>Eventos y Empresas</h3>
            </div>

            <!-- DUPLICAMOS PARA DAR VOLUMEN VISUAL -->
            <div class="card">
                <img src="images/trabajos/pedidosPersonalizados.png" alt="">
                <h3>Pedidos Personalizados</h3>
            </div>

            <div class="card">
                <img src="images/trabajos/regalosCoorp.png" alt="">
                <h3>Regalos Corporativos</h3>
            </div>

            <div class="card">
                <img src="images/trabajos/produccionLote.png" alt="">
                <h3>Producción en Lote</h3>
            </div>

        </div>

    </section>

</main>

<div id="footer-container"></div>

<script src="js/header.js?v=20260518"></script>

</body>
</html>
